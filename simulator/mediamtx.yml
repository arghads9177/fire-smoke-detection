# MediaMTX configuration for the camera simulator (plan §3.1).
# Exposes RTSP on :8554; ffmpeg loops publish cam1..cam4 onto it.

logLevel: info

rtsp: yes
rtspAddress: :8554
# Plain RTSP only — "optional" (the default) makes MediaMTX generate auto.crt/auto.key
# TLS certs in the working directory, which we don't want littering the repo.
rtspEncryption: "no"
# TCP only (publishers and the AI service both use it); also frees the default
# UDP/RTP listeners on :8000/:8001 — port 8000 belongs to the FastAPI backend.
rtspTransports: [tcp]

# RTMP ingest — lets a phone (e.g. Larix Broadcaster) push a live camera feed
# in, which is then re-exposed over RTSP at rtsp://<host>:8554/phonecam for the
# AI service to consume (see PHONE_CAMERA_MEDIAMTX_PLAN.md).
rtmp: yes
rtmpAddress: :1935
rtmpEncryption: "no"

# HLS output — lets the dashboard embed a live preview of each camera
# (browsers can't play RTSP directly). Served per-path at :8888/<path>/index.m3u8.
# "mpegts" variant remuxes without re-encoding, so it works with the
# simulator's B-frame-encoded test clips (unlike WebRTC, which doesn't).
hls: yes
hlsAddress: :8888
hlsVariant: mpegts

# Disable protocols the MVP doesn't use
webrtc: no
srt: no
moq: no       # default-on in v1.19+, and auto-generates TLS certs in the cwd

paths:
  # Streams are published dynamically by ffmpeg (cam1..cam4); accept anything.
  all_others:
